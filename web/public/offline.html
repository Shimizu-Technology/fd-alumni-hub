<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#42101f" />
    <title>Offline | FD Alumni Basketball Hub</title>
    <style>
      :root { color-scheme: light; --maroon: #42101f; --gold: #c89b3c; --paper: #fffaf5; --muted: #6d6472; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 1rem; font-family: Arial, Helvetica, sans-serif; background: radial-gradient(circle at top left, rgba(200,155,60,.22), transparent 24rem), var(--paper); color: #17141a; }
      main { width: min(30rem, 100%); padding: 2rem; border: 1px solid #e7dfe5; border-radius: 1.5rem; background: rgba(255,255,255,.9); box-shadow: 0 24px 80px rgba(66,16,31,.12); text-align: center; }
      .mark { display: grid; place-items: center; width: 4rem; height: 4rem; margin: 0 auto 1rem; border-radius: 1.2rem; background: var(--gold); color: var(--maroon); font-weight: 900; }
      h1 { margin: 0; color: var(--maroon); letter-spacing: -.04em; }
      p { margin: .75rem 0 0; color: var(--muted); line-height: 1.6; }
      a { display: inline-flex; margin-top: 1.2rem; padding: .8rem 1rem; border-radius: 999px; background: var(--maroon); color: #fff; font-weight: 900; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">FD</div>
      <h1>Connection needed</h1>
      <p>The tournament hub needs an internet connection to load the latest schedule, scores, tickets, streams, and coverage.</p>
      <a href="/">Try again</a>
    </main>
  </body>
</html>
