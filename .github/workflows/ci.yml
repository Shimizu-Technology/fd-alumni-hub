name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    name: Next app
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Install Linux CSS optional packages
        run: npm --workspace @fd/web install --no-save lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  rails_api:
    name: Rails API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: api

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install packages
        run: sudo apt-get update && sudo apt-get install --no-install-recommends -y libpq-dev libvips
        working-directory: .

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.4
          bundler-cache: true
          working-directory: api

      - name: Security scan
        run: bin/brakeman --no-pager

      - name: Bundle audit
        run: bin/bundler-audit

      - name: RuboCop
        run: bin/rubocop --no-color

      - name: Test
        env:
          RAILS_ENV: test
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/fd_alumni_hub_api_test
        run: bin/rails db:test:prepare test
